# Jupyter Book v2 / MyST project configuration.
# Build the website locally with:   jupyter-book start
# Build static HTML with:           jupyter-book build --html
version: 1

project:
  title: Cellular Automata Dynamics
  subtitle: Explorations in Parallel Processing (Python Edition)
  authors:
    - name: Rafael Espericueta
      affiliation: Bakersfield College
      note: Professor of Mathematics Emeritus
  copyright: "1997, 2026 Rafael Espericueta. Code MIT; text CC BY 4.0."
  github: https://github.com/USERNAME/ca-dynamics
  # Chapters are the executed notebooks plus a landing page.
  toc:
    - file: docs/intro.md
    - file: notebooks/01_what_are_cellular_automata.ipynb
    - file: notebooks/02_zero_dimensional_ca.ipynb
    - file: notebooks/03_one_dimensional_ca.ipynb
    - file: notebooks/04_two_dimensional_ca.ipynb
    - file: notebooks/05_ecosystem_modeling.ipynb
    - file: notebooks/06_wolfram_classification.ipynb
    - file: notebooks/07_evolutionary_dynamics.ipynb
  exclude:
    - latex/**
    - figures/**

site:
  template: book-theme
  options:
    logo_text: Cellular Automata Dynamics
